name: CI

on:
  push:
    branches: [main, "codex/**"]
    paths-ignore:
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout language tools
        uses: actions/checkout@v6
        with:
          path: interlis-language-tools
          persist-credentials: false
      - name: Checkout compiler packages
        uses: actions/checkout@v6
        with:
          repository: edigonzales/ilic-fork
          path: ilic-fork
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: interlis-language-tools/pnpm-lock.yaml
      - name: Build pinned compiler WASM
        shell: bash
        working-directory: ilic-fork
        run: |
          set -euo pipefail
          emscripten_version=$(tr -d '[:space:]' < .emscripten-version)
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$emscripten_version"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$emscripten_version"
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          ./scripts/build-wasm.sh
      - name: Install locked dependencies
        working-directory: interlis-language-tools
        run: pnpm install --frozen-lockfile
      - name: Lint, typecheck, test and build
        working-directory: interlis-language-tools
        run: pnpm check
      - name: Generate core coverage report (non-blocking)
        continue-on-error: true
        working-directory: interlis-language-tools
        run: pnpm --filter @ilic/language-service test:coverage
      - name: Upload core coverage report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: interlis-language-service-coverage-${{ github.sha }}
          path: interlis-language-tools/packages/language-service/coverage
          if-no-files-found: ignore
          retention-days: 14
      - name: Verify npm tarball consumers
        working-directory: interlis-language-tools
        run: pnpm pack:verify
      - name: Build and inspect universal VSIX
        working-directory: interlis-language-tools
        run: pnpm package:vsix
      - name: Check production licenses and vulnerabilities
        working-directory: interlis-language-tools
        run: pnpm licenses:check && pnpm security:check
      - name: Upload installable artifacts
        uses: actions/upload-artifact@v6
        with:
          name: interlis-language-tools-${{ github.sha }}
          path: |
            interlis-language-tools/artifacts/*.vsix
            interlis-language-tools/artifacts/npm/*.tgz
          if-no-files-found: error
          retention-days: 14
