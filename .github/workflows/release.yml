name: Publish VS Code extension

on:
  workflow_dispatch:
    inputs:
      pre_release:
        description: Publish as a Marketplace pre-release
        required: true
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      VSIX_PRE_RELEASE: ${{ inputs.pre_release && '1' || '0' }}
    steps:
      - name: Checkout language tools
        uses: actions/checkout@v6
        with:
          path: interlis-language-tools
          persist-credentials: false
      - name: Checkout compiler packages
        uses: actions/checkout@v6
        with:
          repository: edigonzales/ilic-fork
          path: ilic-fork
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 11.14.0
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: interlis-language-tools/pnpm-lock.yaml
      - name: Build compiler WASM
        shell: bash
        working-directory: ilic-fork
        run: |
          set -euo pipefail
          emscripten_version=$(tr -d '[:space:]' < .emscripten-version)
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git "$RUNNER_TEMP/emsdk"
          "$RUNNER_TEMP/emsdk/emsdk" install "$emscripten_version"
          "$RUNNER_TEMP/emsdk/emsdk" activate "$emscripten_version"
          source "$RUNNER_TEMP/emsdk/emsdk_env.sh"
          ./scripts/build-wasm.sh
      - name: Build and verify extension
        working-directory: interlis-language-tools
        run: |
          pnpm install --frozen-lockfile
          pnpm check
          pnpm package:vsix
          pnpm licenses:check
          pnpm security:check
      - uses: actions/upload-artifact@v6
        with:
          name: interlis-language-tools-vsix-${{ github.sha }}
          path: interlis-language-tools/artifacts/interlis-language-tools.vsix
          if-no-files-found: error

  marketplace:
    needs: build
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: interlis-language-tools-vsix-*
          path: artifacts
          merge-multiple: true
      - name: Publish to VS Code Marketplace
        if: env.VSCE_PAT != ''
        run: npx --yes @vscode/vsce@3.9.2 publish --packagePath artifacts/interlis-language-tools.vsix --pat "$VSCE_PAT"
      - name: Preserve VSIX when Marketplace credentials are absent
        if: env.VSCE_PAT == ''
        run: echo "VSCE_PAT is not configured; the verified VSIX remains available as an artifact."

  open-vsx:
    needs: build
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: interlis-language-tools-vsix-*
          path: artifacts
          merge-multiple: true
      - name: Publish to Open VSX
        if: env.OVSX_PAT != ''
        run: npx --yes ovsx@1.0.2 publish artifacts/interlis-language-tools.vsix --pat "$OVSX_PAT"
      - name: Preserve VSIX when Open VSX credentials are absent
        if: env.OVSX_PAT == ''
        run: echo "OVSX_PAT is not configured; the verified VSIX remains available as an artifact."
